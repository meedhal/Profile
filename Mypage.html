<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>مدهال | وسائل التواصل</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* Reset & قاعدة عامة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0b0c1a 0%, #1a1e30 100%);
            padding: 20px;
            margin: 0;
        }

        /* البطاقة الرئيسية */
        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 56px;
            padding: 32px 24px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* صورة البروفايل - بتأثير خيالي */
        .profile-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            padding: 4px;
            box-shadow: 0 0 40px rgba(245, 87, 108, 0.5);
            animation: floatGlow 3s infinite alternate ease-in-out;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0b0c1a;
            background: #1a1e30;
            display: block;
        }

        @keyframes floatGlow {
            0% {
                transform: translateY(0px) scale(1);
                box-shadow: 0 0 30px rgba(245, 87, 108, 0.4);
            }
            100% {
                transform: translateY(-8px) scale(1.02);
                box-shadow: 0 0 60px rgba(79, 172, 254, 0.7);
            }
        }

        /* النص الرئيسي */
        .title {
            text-align: center;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 32px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 18px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .subtitle i {
            color: #f5576c;
            margin: 0 6px;
        }

        /* شبكة الأيقونات */
        .social-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 18px 20px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* تأثير التموج عند الضغط (ripple) */
        .social-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .social-btn:active::after {
            width: 400px;
            height: 400px;
        }

        .social-btn i {
            font-size: 1.9rem;
            width: 34px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        /* حركة الأيقونة عند hover */
        .social-btn:hover i {
            transform: scale(1.25) rotate(4deg);
        }

        .social-btn:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
        }

        /* ألوان مميزة لكل منصة */
        .btn-facebook {
            background: linear-gradient(135deg, #1877f2, #1e3c72);
            border-color: #1877f2;
        }
        .btn-facebook i {
            color: #fff;
        }

        .btn-youtube {
            background: linear-gradient(135deg, #ff0000, #b31217);
            border-color: #ff0000;
        }
        .btn-youtube i {
            color: #fff;
        }

        .btn-instagram {
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            border-color: #dc2743;
        }
        .btn-instagram i {
            color: #fff;
        }

        .btn-snapchat {
            background: linear-gradient(135deg, #fffc00, #f5c800);
            border-color: #fffc00;
        }
        .btn-snapchat i {
            color: #1a1a1a;
        }
        .btn-snapchat span {
            color: #1a1a1a;
        }

        .btn-tiktok {
            background: linear-gradient(135deg, #00f2ea, #ff0050, #000000);
            border-color: #00f2ea;
        }
        .btn-tiktok i {
            color: #fff;
        }

        /* إضافة X (تويتر سابقاً) */
        .btn-x {
            background: linear-gradient(135deg, #000000, #1a1a1a);
            border-color: #333333;
        }
        .btn-x i {
            color: #ffffff;
        }
        .btn-x:hover {
            border-color: #666666;
            box-shadow: 0 16px 40px rgba(255, 255, 255, 0.1);
        }

        /* تنسيق النص بجانب الأيقونة */
        .social-btn span {
            flex: 1;
            text-align: center;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }

        /* إضاءة جانبية خفيفة */
        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05), transparent 70%);
            pointer-events: none;
        }

        /* تذييل صغير */
        .footer-note {
            margin-top: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.7rem;
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* تحسينات للجوال */
        @media (max-width: 480px) {
            .card {
                padding: 24px 16px 32px;
                border-radius: 40px;
            }
            .profile-img {
                width: 120px;
                height: 120px;
            }
            .social-btn {
                padding: 15px 14px;
                font-size: 0.95rem;
            }
            .social-btn i {
                font-size: 1.7rem;
                width: 30px;
            }
        }

        /* إضافة تأثير خلفية متحركة (اختياري) */
        .glow-orbs {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245, 87, 108, 0.15), transparent 70%);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            z-index: -1;
            animation: orbMove 12s infinite alternate;
        }
        .glow-orbs2 {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.1), transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            z-index: -1;
            animation: orbMove2 15s infinite alternate;
        }

        @keyframes orbMove {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(-60px, 40px) scale(1.2);
            }
        }
        @keyframes orbMove2 {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(50px, -30px) scale(1.3);
            }
        }

        /* إخفاء التموج على الأجهزة التي لا تدعم :active بشكل جيد */
        .social-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <!-- كرات خلفية متحركة (تأثير جمالي) -->
    <div class="glow-orbs"></div>
    <div class="glow-orbs2"></div>

    <div class="card">

        <!-- صورة البروفايل (استخدم صورتك) -->
        <div class="profile-wrapper">
            <div class="profile-img">
                <!-- ضع هنا رابط صورتك أو استخدم صورة افتراضية -->
                <img src="https://i.servimg.com/u/f47/20/63/54/88/eeeiei10.png" alt="مدهال" />
            </div>
        </div>

        <!-- النصوص -->
        <div class="title">مِدْهَال | حيث للحكمة مجلس، وللقصة عِبرة</div>
        <div class="subtitle">
            <i class="fas fa-share-alt"></i> روابط صفحة مدهال على وسائل التواصل <i class="fas fa-share-alt"></i>
        </div>

        <!-- قائمة الروابط -->
        <div class="social-grid">

            <!-- فيسبوك -->
            <a href="https://www.facebook.com/share/1HMFPxbXvk/" target="_blank" class="social-btn btn-facebook" rel="noopener noreferrer">
                <i class="fab fa-facebook-f"></i>
                <span>فيسبوك</span>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem; opacity: 0.5;"></i>
            </a>

            <!-- يوتيوب -->
            <a href="https://www.youtube.com/@meedhall?si=GXQDadw2tBr894d2" target="_blank" class="social-btn btn-youtube" rel="noopener noreferrer">
                <i class="fab fa-youtube"></i>
                <span>يوتيوب</span>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem; opacity: 0.5;"></i>
            </a>

            <!-- إنستغرام -->
            <a href="https://www.instagram.com/meedhal.sy?igsh=NmpqOWlzNHI5aXJs" target="_blank" class="social-btn btn-instagram" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i>
                <span>إنستغرام</span>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem; opacity: 0.5;"></i>
            </a>

            <!-- سناب شات -->
            <a href="https://www.snapchat.com/add/meedhal0?share_id=esNwAOBK2xc&locale=ar-EG" target="_blank" class="social-btn btn-snapchat" rel="noopener noreferrer">
                <i class="fab fa-snapchat-ghost"></i>
                <span>سناب شات</span>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem; opacity: 0.5;"></i>
            </a>

            <!-- تيك توك -->
            <a href="https://www.tiktok.com/@t0.0k?_r=1&_t=ZS-97iwjEJGBmC" target="_blank" class="social-btn btn-tiktok" rel="noopener noreferrer">
                <i class="fab fa-tiktok"></i>
                <span>تيك توك</span>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem; opacity: 0.5;"></i>
            </a>

            <!-- X (تويتر سابقاً) - تمت إضافتها أخيراً -->
            <a href="https://x.com/meedhal0" target="_blank" class="social-btn btn-x" rel="noopener noreferrer">
                <i class="fab fa-x-twitter"></i>
                <span>X</span>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem; opacity: 0.5;"></i>
            </a>

        </div>

        <div class="footer-note">
            <i class="fas fa-hand-peace"></i> اضغط وانتقل فوراً
        </div>
    </div>

    <!-- تنبيه صغير: الفتح عبر التطبيق يعتمد على إعدادات الجهاز، لكن الروابط صحيحة -->
</body>
  </html>
